[package]
name = "footage"
version = "1.3.2"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
gettext-rs = { version = "0.7", features = ["gettext-system"] }
glib = "0.20"
gtk = { version = "0.9", package = "gtk4", features = ["blueprint", "gnome_46"] }
gtk-macros = { version = "0.9", package = "gtk4-macros", features = [
    "blueprint",
] }
adw = { version = "0.7", package = "libadwaita", features = ["v1_5"] }
log = "0.4"
once_cell = "1.19"
pretty_env_logger = "0.5"
itertools = "0.13"
ashpd = { version = "0.9", features = ["gtk4"]}
async-std = "1.12"
gst = { version = "0.23", package = "gstreamer", features = ["v1_22"] }
ges = { version = "0.23", package = "gstreamer-editing-services", features = ["v1_22"] }
url = "2.5"
gstreamer-video = { version = "0.23", features = ["v1_22"] }
ordered-float = "4"
gstreamer-pbutils = { version = "0.23", features = ["v1_22"] }
fraction = "0.15"
derivative = "2.2"
async-channel = "2.3"
